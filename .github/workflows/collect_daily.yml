name: 🤖 EERS 데이터 자동 수집 (Daily)

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21:00 전날) 자동 실행
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 수동 실행 (GitHub Actions 탭 → Run workflow)
    inputs:
      target_date:
        description: '수집 날짜 (YYYYMMDD, 비워두면 오늘)'
        required: false
        default: ''

jobs:
  collect:
    name: 공고 데이터 수집 → Supabase 저장
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 의존성 설치
        run: pip install -r requirements.txt

      - name: 🚀 데이터 수집 실행
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          NARA_SERVICE_KEY: ${{ secrets.NARA_SERVICE_KEY }}
          KAPT_SERVICE_KEY: ${{ secrets.KAPT_SERVICE_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          python - << 'PYEOF'
          import os, sys
          from datetime import datetime, timedelta

          # ── Python 경로에 파이썬 소스 폴더 추가 ──
          sys.path.insert(0, os.path.join(os.getcwd(), "collector"))

          # ── 환경변수로 config 값 덮어쓰기 ──
          import config as cfg
          cfg.SUPABASE_DB_URL  = os.environ["SUPABASE_DB_URL"]
          cfg.NARA_SERVICE_KEY = os.environ["NARA_SERVICE_KEY"]
          cfg.KAPT_SERVICE_KEY = os.environ["KAPT_SERVICE_KEY"]

          from collect_data import (
              fetch_and_process_bid_notices,
              fetch_and_process_contracts,
              fetch_and_process_delivery_requests,
              fetch_and_process_kapt_bids,
              fetch_and_process_kapt_bid_results,
          )

          target = os.environ.get("TARGET_DATE", "").strip()
          
          dates_to_run = []
          if "-" in target:
              start_str, end_str = target.split("-")
              start_date = datetime.strptime(start_str, "%Y%m%d")
              end_date = datetime.strptime(end_str, "%Y%m%d")
              delta = end_date - start_date
              dates_to_run = [(start_date + timedelta(days=i)).strftime("%Y%m%d") for i in range(delta.days + 1)]
          else:
              dates_to_run = [target if target else datetime.now().strftime("%Y%m%d")]

          for search_date in dates_to_run:
              print(f"=== EERS 데이터 수집 시작: {search_date} ===")
              fetch_and_process_bid_notices(search_date)
              fetch_and_process_contracts(search_date)
              fetch_and_process_delivery_requests(search_date)
              fetch_and_process_kapt_bids(search_date)
              fetch_and_process_kapt_bid_results(search_date)

          print("=== 수집 완료! ===")
          PYEOF

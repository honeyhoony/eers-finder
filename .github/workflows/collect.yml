name: Daily Data Collection

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국시간 오전 9시 (UTC 00:00)
  workflow_dispatch: 

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r collector/requirements.txt

      - name: Run collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          NARA_SERVICE_KEY: ${{ secrets.NARA_SERVICE_KEY }}
          KAPT_SERVICE_KEY: ${{ secrets.KAPT_SERVICE_KEY }}
          KEA_SERVICE_KEY_DECODING: ${{ secrets.KEA_SERVICE_KEY_DECODING }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          INTERNAL_PUSH_SECRET: ${{ secrets.INTERNAL_PUSH_SECRET }}
        run: |
          python collector/collect_data.py
